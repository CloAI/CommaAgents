name: Security checks

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - name: Install verified Gitleaks
        shell: bash
        run: |
          version="8.30.1"
          archive="gitleaks_${version}_linux_x64.tar.gz"
          curl -fsSLO "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  ${archive}" | sha256sum --check
          tar -xzf "$archive" gitleaks
      - name: Scan full Git history
        run: ./gitleaks git . --redact
      - run: bun run packages:build
      - name: Scan publication artifacts
        shell: bash
        run: |
          for package in core daemon tui cli; do
            ./gitleaks dir "packages/$package/dist" --redact
          done
      - name: Audit production dependencies
        run: bun audit --production

  dependency-review:
    if: github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: high

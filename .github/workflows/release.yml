name: Publish release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install --global npm@11.5.1
      - run: bun install --frozen-lockfile
      - name: Validate release tag
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v$version" >&2
            exit 1
          fi
      - run: bun run packages:build
      - run: bun run packages:validate
      - run: bun test packages/cli/src packages/daemon/src/daemon-control packages/core/src/abortable
      - name: Publish npm packages with trusted publishing
        shell: bash
        run: |
          for package in core daemon tui cli; do
            name="$(node -p "require('./packages/$package/package.json').name")"
            version="$(node -p "require('./packages/$package/package.json').version")"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version is already published; skipping"
            else
              npm publish "./packages/$package" --access public --tag next
            fi
          done
      - run: bun run --cwd packages/cli build:standalone all
      - name: Package standalone executables
        shell: bash
        run: |
          mkdir -p artifacts
          for target in darwin-arm64 darwin-x64 linux-arm64 linux-arm64-musl linux-x64 linux-x64-musl; do
            tar -C "packages/cli/dist/standalone/$target" -czf "artifacts/comma-$target.tar.gz" comma
          done
          for target in windows-arm64 windows-x64; do
            zip -j "artifacts/comma-$target.zip" "packages/cli/dist/standalone/$target/comma.exe"
          done
          (cd artifacts && sha256sum comma-* > SHA256SUMS)
      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v$version"
          prerelease=()
          [[ "$version" == *-* ]] && prerelease=(--prerelease)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/* --clobber
          else
            gh release create "$tag" artifacts/* --generate-notes "${prerelease[@]}"
          fi

name: Bootstrap npm packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact version to publish
        required: true
        default: 2.0.0-rc.0

permissions:
  contents: read

jobs:
  publish:
    if: inputs.version == '2.0.0-rc.0'
    runs-on: ubuntu-latest
    environment: npm-bootstrap
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@11.5.1
      - run: bun install --frozen-lockfile
      - run: bun run packages:build
      - run: bun run packages:validate
      - name: Confirm version
        run: test "$(node -p "require('./package.json').version")" = "${{ inputs.version }}"
      - name: Publish packages in dependency order
        shell: bash
        run: |
          for package in core daemon tui cli; do
            name="$(node -p "require('./packages/$package/package.json').name")"
            version="$(node -p "require('./packages/$package/package.json').version")"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version is already published; skipping"
            else
              npm publish "./packages/$package" --access public --tag next
            fi
          done
